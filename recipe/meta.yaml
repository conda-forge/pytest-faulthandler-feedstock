{% set name = "pytest-faulthandler" %}
{% set version = "2.0.1" %}
{% set hash = "ed72bbce87ac344da81eb7d882196a457d4a1026a3da4a57154dacd85cd71ae5" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/p/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ hash }}

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - pytest >=5.0    

about:
  home: https://github.com/pytest-dev/pytest-faulthandler
  license: MIT
  summary: py.test plugin that activates the fault handler module for tests (dummy package now)

extra:
  recipe-maintainers:
    - nicoddemus
